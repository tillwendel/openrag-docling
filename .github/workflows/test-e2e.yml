name: E2E Tests

on:
  pull_request:
    paths:
      - 'src/**'
      - 'frontend/**'
      - 'tests/**'
      - 'scripts/**'
      - 'flows/**'
      - 'docker-compose.yml'
      - 'Dockerfile*'
      - 'Makefile'
      - '.github/workflows/test-e2e.yml'
  workflow_dispatch:

env:
  NODE_VERSION: "22"
  PYTHON_VERSION: "3.13"
  # Define the directory where Playwright browsers will be installed.
  # This path is used for caching across workflows
  PLAYWRIGHT_BROWSERS_PATH: "ms-playwright"
  PLAYWRIGHT_VERSION: "1.57.0"

jobs:
  e2e:
    runs-on: ubuntu-latest
    env:
      LANGFLOW_AUTO_LOGIN: "True"
      LANGFLOW_NEW_USER_IS_ACTIVE: "True"
      LANGFLOW_ENABLE_SUPERUSER_CLI: "True"

    steps:
      - name: Cleanup Docker cache
        run: |
          docker system prune -af || true
          docker builder prune -af || true
          docker compose -f docker-compose.yml down -v --remove-orphans || true

      - name: Cleanup root-owned files (OpenSearch data, config)
        run: |
          for i in 1 2 3; do
            docker run --rm -v $(pwd):/work alpine sh -c "rm -rf /work/opensearch-data /work/config" && break
            echo "Attempt $i failed, retrying in 5s..."
            sleep 5
          done || true

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up UV
        uses: astral-sh/setup-uv@v7
        with:
          version: latest

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Python
        run: uv python install 3.13

      - name: Install backend dependencies
        run: uv sync

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Cache Docker Images
        id: cache-docker
        uses: actions/cache@v5
        with:
          path: ${{ runner.temp }}/docker-cache
          key: docker-images-v1-${{ runner.os }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            docker-images-v1-${{ runner.os }}-

      - name: Validate Docker Cache
        id: validate-docker-cache
        if: steps.cache-docker.outputs.cache-hit == 'true'
        run: |
          TAR="${{ runner.temp }}/docker-cache/images.tar"
          # Require at least 100 MB to consider the cache valid
          MIN_SIZE=$((100 * 1024 * 1024))
          if [ -f "$TAR" ] && [ "$(stat -c%s "$TAR")" -ge "$MIN_SIZE" ]; then
            echo "Docker cache is valid ($(du -sh "$TAR" | cut -f1))"
            echo "valid=true" >> $GITHUB_OUTPUT
          else
            echo "Docker cache is invalid or too small, deleting..."
            rm -f "$TAR"
            echo "valid=false" >> $GITHUB_OUTPUT
          fi

      - name: Load Cached Docker Images
        if: steps.cache-docker.outputs.cache-hit == 'true' && steps.validate-docker-cache.outputs.valid == 'true'
        run: |
          echo "Loading cached Docker images..."
          docker load -i ${{ runner.temp }}/docker-cache/images.tar

      # Cache Playwright browsers using a composite key
      - name: Cache Playwright Browsers
        id: cache-playwright
        uses: actions/cache@v5
        with:
          path: ${{ env.PLAYWRIGHT_BROWSERS_PATH }}
          key: playwright-${{ env.PLAYWRIGHT_VERSION }}-chromium-${{ runner.os }}
          restore-keys: |
            playwright-${{ env.PLAYWRIGHT_VERSION }}-chromium-${{ runner.os }}

      - name: Install Playwright Browsers
        working-directory: frontend
        if: steps.cache-playwright.outputs.cache-hit != 'true'
        run: |
          npx playwright install --with-deps chromium

      - name: Setup E2E infrastructure
        run: |
          chmod +x scripts/setup-e2e.sh
          ./scripts/setup-e2e.sh

      - name: Save Docker Images for Caching
        if: steps.cache-docker.outputs.cache-hit != 'true' || steps.validate-docker-cache.outputs.valid == 'false'
        run: |
          echo "Saving Docker images to cache..."
          rm -rf ${{ runner.temp }}/docker-cache
          mkdir -p ${{ runner.temp }}/docker-cache
          docker save -o ${{ runner.temp }}/docker-cache/images.tar \
            langflowai/openrag-opensearch:latest \
            langflowai/openrag-backend:latest \
            langflowai/openrag-langflow:latest \
            opensearchproject/opensearch-dashboards:3.0.0 || true

      - name: Ensure JWT keys for local backend
        run: |
          # Keys created by Docker are root-owned and unreadable by the runner.
          # Remove via Docker (handles root ownership), then regenerate as runner user.
          docker run --rm -v $(pwd):/work alpine sh -c "rm -f /work/keys/private_key.pem /work/keys/public_key.pem" || true
          uv run python -c "from src.main import generate_jwt_keys; generate_jwt_keys()"
          chmod 600 keys/private_key.pem
          chmod 644 keys/public_key.pem

      - name: Start docling-serve
        run: make docling

      - name: Run Playwright tests
        working-directory: frontend
        env:
          CI: "true"
          OPENSEARCH_HOST: localhost
          OPENSEARCH_PORT: "9200"
          OPENSEARCH_USERNAME: admin
          GOOGLE_OAUTH_CLIENT_ID: ""
          GOOGLE_OAUTH_CLIENT_SECRET: ""
        run: npx playwright test

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: frontend/playwright-report/
          retention-days: 14

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-test-results
          path: frontend/test-results/
          retention-days: 7

      - name: Teardown infrastructure
        if: always()
        run: |
          make docling-stop || true
          ENV_FILE="frontend/.env.test"
          if [ ! -f "$ENV_FILE" ]; then ENV_FILE="frontend/.env.test.example"; fi
          docker compose --env-file "$ENV_FILE" down -v --remove-orphans || true
          docker system prune -f || true
